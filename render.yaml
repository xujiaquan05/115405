services:
  - type: web
    name: medical-beauty-opinion
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medical-beauty-db
          property: connectionString
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: CORS_ORIGINS
        value: ""
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: medical-beauty-db
    databaseName: medical_beauty_db
    user: medical_beauty_user
